name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scoped for Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest  # GitHub-hosted, free for public repos
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # enables Pages (build_type=workflow) on first run

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site       # site/CNAME becomes /CNAME -> sets custom domain as code

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
