name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scoped for Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest  # GitHub-hosted, free for public repos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22
          # installs deps, runs `astro build`, and uploads ./dist as the Pages artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
