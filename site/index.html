<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vikas Koppineedi</title>
  <meta name="description" content="Vikas Koppineedi — links to my blog, portfolio, music and more." />
  <style>
    :root {
      --bg: #0e0f13;
      --card: #181a21;
      --card-hover: #20232c;
      --text: #f2f3f5;
      --muted: #9aa0ac;
      --accent: #1db954; /* spotify green as the seed accent */
      --border: #262932;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7f9;
        --card: #ffffff;
        --card-hover: #f0f1f4;
        --text: #14161a;
        --muted: #5b616e;
        --border: #e4e6ea;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 520px; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--accent), #128a3e);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 700; color: #fff;
      user-select: none;
    }
    h1 { text-align: center; font-size: 24px; font-weight: 700; letter-spacing: -0.01em; }
    .tagline { text-align: center; color: var(--muted); margin-top: 6px; font-size: 15px; }
    .links { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
    .link {
      display: flex; align-items: center; gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600; font-size: 15px;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .link:hover { background: var(--card-hover); transform: translateY(-2px); border-color: var(--accent); }
    .link .emoji { font-size: 20px; width: 24px; text-align: center; }
    .link .sub { display: block; font-weight: 400; color: var(--muted); font-size: 13px; margin-top: 2px; }
    .link .body { flex: 1; }
    .badge {
      font-size: 11px; font-weight: 600; color: var(--muted);
      border: 1px solid var(--border); border-radius: 999px; padding: 3px 8px;
    }
    footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 32px; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="avatar" aria-hidden="true">V</div>
    <h1>Vikas Koppineedi</h1>
    <p class="tagline">Engineer · DJ · building things</p>

    <nav class="links">
      <a class="link" href="/music/">
        <span class="emoji">🎧</span>
        <span class="body">My Music
          <span class="sub">Auto-updated Spotify playlists</span>
        </span>
        <span class="badge">soon</span>
      </a>
      <a class="link" href="/blog/">
        <span class="emoji">✍️</span>
        <span class="body">Tech Blog
          <span class="sub">Notes on what I'm building</span>
        </span>
        <span class="badge">soon</span>
      </a>
      <a class="link" href="/portfolio/">
        <span class="emoji">💼</span>
        <span class="body">Portfolio &amp; Resume
          <span class="sub">Work, projects, CV</span>
        </span>
        <span class="badge">soon</span>
      </a>
    </nav>

    <footer>vikas.koppineedi.com · placeholder — under construction</footer>
  </main>
</body>
</html>
